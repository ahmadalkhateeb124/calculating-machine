<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Modern Calculator with Glassmorphism Design">
    <link rel="stylesheet" href="Index.css">
    <title>Modern Calculator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div id="calculator_container">
        <div id="display_area" aria-live="polite" aria-label="Calculator display"></div>

        <div class="calculator_row">
            <button type="button" aria-label="Clear">C</button>
            <button type="button" aria-label="Open parenthesis">(</button>
            <button type="button" aria-label="Close parenthesis">)</button>
            <button type="button" aria-label="Divide">/</button>
        </div>

        <div class="calculator_row">
            <button type="button" aria-label="7">7</button>
            <button type="button" aria-label="8">8</button>
            <button type="button" aria-label="9">9</button>
            <button type="button" aria-label="Multiply">*</button>
        </div>

        <div class="calculator_row">
            <button type="button" aria-label="4">4</button>
            <button type="button" aria-label="5">5</button>
            <button type="button" aria-label="6">6</button>
            <button type="button" aria-label="Subtract">-</button>
        </div>

        <div class="calculator_row">
            <button type="button" aria-label="1">1</button>
            <button type="button" aria-label="2">2</button>
            <button type="button" aria-label="3">3</button>
            <button type="button" aria-label="Add">+</button>
        </div>

        <div class="calculator_row">
            <button type="button" aria-label="Delete">DEL</button>
            <button type="button" aria-label="0">0</button>
            <button type="button" aria-label="Decimal point">.</button>
            <button type="button" aria-label="Equals">=</button>
        </div>
    </div>

    <script src="./Index.js"></script>
</body>

</html>
